work_dir: ./work_dir/recognition/tag/STGCN_C4_processed_semTA_TAG_KD_softselector_1

phase: train
save_interval: 10
eval_interval: 1
log_interval: 100
print_log: true
save_result: false
pavi_log: false

# ===== feeder: basketball_processed =====
feeder: feeder.feeder.Feeder
num_worker: 0
train_feeder_args:
  data_path: data/basketball_processed/GAR/C4/train_data.npy
  label_path: data/basketball_processed/GAR/C4/train_label.pkl
  random_choose: false
  random_move: false
  window_size: 400
  debug: false
test_feeder_args:
  data_path: data/basketball_processed/GAR/C4/val_data.npy
  label_path: data/basketball_processed/GAR/C4/val_label.pkl

# ===== model =====
model: net.shift_dual_stgcn_backbone.Model
model_args:
  in_channels: 4
  num_class: 20
  num_point: 17
  num_person: 6
  graph_args: { layout: sga_interact_17, strategy: spatial }

  # ----- semantic / TA -----
  in_channels_semantic: 1
  use_temporal_attention: true

  # ----- TAG + Soft-Selector（关键：soft_selector 必须放在 tag 里） -----
  tag:
    enable: true
    mode: ball
    use_ball: true
    detach_adj: true
    norm: sym
    lambda_fuse: 0.10
    learnable_lambda: true
    self_loop: true
    ramp_epochs: 12
    tau: 0.35                # ball center temperature (越小越接近 argmax)
    ball_mix: true            # ✅ 开启 ball + knn 融合
    ball_weight: -1.0         # ✅ 自适应 w_ball（推荐）；固定就写 0.7 之类
    ball_tau_center: 0.35     # 可选：覆盖 tau
    # Soft Selector (MoE over k)
    soft_selector:
      enable: true
      k_list: [2, 3, 4, 5]
      selector: global        # global 最稳；后面再试 per_sample / per_class_prior
      warmup_epochs: 12
      gate_init: 0.0
      gate_max: 1.0
      temperature: 1.0

  # ----- backbone: freeze 的 ST-GCN -----
  backbone_cls: net.st_gcn.Model
  backbone_args:
    in_channels: 4
    num_class: 20
    edge_importance_weighting: true
    graph_args: { layout: sga_interact_17, strategy: spatial }
  backbone_weights: ./work_dir/recognition/tag/ST_GCN_C4_processed/best_model.pt
  backbone_ignore: []
  freeze_backbone: true
  person_pool: mean

  # ----- KD -----
  kd:
    enable: true
    alpha: 0.3
    temperature: 2.0

device: [0]
batch_size: 16
test_batch_size: 8
num_epoch: 40
base_lr: 0.005
weight_decay: 0.0005
step: [25, 35]
show_topk: [1, 5]

# processor 旧字段兼容
use_kd: true
kd_alpha: 0.3
kd_temperature: 2.0

work_dir: ./work_dir/recognition/tag/STGCN_C4_processed_TAG_WARMUP_fix

phase: train
save_interval: 10
eval_interval: 1
log_interval: 100
print_log: true

# processed feeder
feeder: feeder.feeder.Feeder
num_worker: 0
train_feeder_args:
  data_path: data/basketball_processed/GAR/C4/train_data.npy
  label_path: data/basketball_processed/GAR/C4/train_label.pkl
  random_choose: false
  random_move: false
  window_size: 400
  debug: false
test_feeder_args:
  data_path: data/basketball_processed/GAR/C4/val_data.npy
  label_path: data/basketball_processed/GAR/C4/val_label.pkl

model: net.stgcn_tag.Model
model_args:
  num_class: 20   # ★ 必须给 stgcn_tag.Model

  backbone_cls: net.st_gcn.Model
  backbone_args:
    in_channels: 4
    num_class: 20
    dropout: 0.5
    edge_importance_weighting: true
    graph_args: { layout: sga_interact_17, strategy: spatial }
  backbone_weights: ./work_dir/recognition/tag/ST_GCN_C4_processed/best_model.pt
  freeze_backbone: true
  person_pool: mean

  tag:
    k: 4
    lambda_fuse: 0.10
    self_loop: true
    warmup_epochs: 12
    tag_scale_max: 1.0

device: [0]
batch_size: 16
test_batch_size: 8
num_epoch: 120
base_lr: 0.005
weight_decay: 0.0005
step: [70, 100]
show_topk: [1, 5]

use_kd: false
kd_alpha: 0.0

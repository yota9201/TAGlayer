work_dir: ./work_dir/recognition/tag/ST_GCN_raw_c3_kinetics_partial

# ===== Feeder：原版 joints+annots，但只用 xyz（3通道）=====
feeder: feeder.feeder_sga.Feeder

train_feeder_args:
  data_root: /datasets/basketball
  split_pkl: train
  label_pkl: GAR_action_info.pkl
  fixed_T: 160
  strict: True
  use_c4: False
  debug: False
  # debug_samples: 256   # 可选：先小跑验证

test_feeder_args:
  data_root: /datasets/basketball
  split_pkl: test
  label_pkl: GAR_action_info.pkl
  fixed_T: 160
  strict: True
  use_c4: False
  debug: False
  # debug_samples: 256

# ===== 模型：3通道 + 17关节图 =====
model: net.st_gcn.Model
model_args:
  in_channels: 3
  num_class: 20
  dropout: 0.5
  edge_importance_weighting: True
  graph_args:
    layout: 'sga_interact_17'
    strategy: 'spatial'

# ===== 预训练权重：Kinetics（通常是 3通道 + 18关节）=====
weights: ./model/st_gcn.kinetics.pt

# ===== 关键：忽略所有和关节数/分类头相关的不匹配层 =====
ignore_weights:
  - A
  - edge_importance
  - data_bn.weight
  - data_bn.bias
  - data_bn.running_mean
  - data_bn.running_var
  - data_bn.num_batches_tracked
  - fcn.weight
  - fcn.bias
  - fc.weight
  - fc.bias
  - classifier.weight
  - classifier.bias

device: [0]
batch_size: 8
test_batch_size: 8
num_epoch: 80
step: [30, 60]
base_lr: 0.01
weight_decay: 0.0005
num_worker: 0
log_interval: 10

work_dir: work_dir/recognition/tag/ST_GCN_C4_processed

phase: train
save_interval: 10
eval_interval: 1
log_interval: 100
print_log: true

feeder: feeder.feeder.Feeder
num_worker: 4

train_feeder_args:
  data_path: data/basketball_processed/GAR/C4/train_data.npy
  label_path: data/basketball_processed/GAR/C4/train_label.pkl
  random_choose: false
  random_move: false
  window_size: 400
  debug: false

test_feeder_args:
  data_path: data/basketball_processed/GAR/C4/val_data.npy
  label_path: data/basketball_processed/GAR/C4/val_label.pkl

model: net.st_gcn.Model
model_args:
  in_channels: 4
  num_class: 20
  edge_importance_weighting: true
  graph_args: {layout: sga_interact_17, strategy: spatial}

# 关键：用你复制进来的 3to4 权重
weights: model/st_gcn_kinetics_3to4.pt

# 关键：忽略不匹配项（A/BN/edge_importance/分类头）
ignore_weights:
  - A
  - data_bn
  - edge_importance
  - fcn
  - fc
  - classifier

device: [0]
batch_size: 8
test_batch_size: 8
num_epoch: 80
base_lr: 0.01
weight_decay: 0.0005
step: [30, 60]
show_topk: [1, 5]

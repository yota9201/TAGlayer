work_dir: ./work_dir/recognition/tag/STGCN_C4_processed_semTA_TAG_KD_k2_ball

phase: train
save_interval: 10
eval_interval: 1
log_interval: 100
print_log: true
save_result: false
pavi_log: false

# ===== feeder: basketball_processed (你已经验证能到 93%) =====
feeder: feeder.feeder.Feeder
num_worker: 0          # 先 0，避免 shm/bus error；稳定后再加
train_feeder_args:
  data_path: data/basketball_processed/GAR/C4/train_data.npy
  label_path: data/basketball_processed/GAR/C4/train_label.pkl
  random_choose: false
  random_move: false
  window_size: 400
  debug: false
test_feeder_args:
  data_path: data/basketball_processed/GAR/C4/val_data.npy
  label_path: data/basketball_processed/GAR/C4/val_label.pkl

# ===== model =====
model: net.shift_dual_stgcn_backbone.Model
model_args:
  in_channels: 4
  num_class: 20
  num_point: 17
  num_person: 6
  graph: net.graph.Graph
  graph_args: { layout: sga_interact_17, strategy: spatial }

  # ----- semantic / TA -----
  in_channels_semantic: 1
  use_temporal_attention: true

  # ----- TAG (来自 tag_layer.py 的参数集合) -----
  tag:
    enable: true
    mode: ball            # 先 knn 稳定；之后再改 ball
    k: 2                 # sweep: 2~6
    lambda_fuse: 0.10
    learnable_lambda: true
    self_loop: true
    alpha_selfloop: 0.5
    norm: sym
    detach_adj: true
    tau: 0.35
    ramp_epochs: 12
    # ball 相关（后续切换时再开）
    use_ball: true
    fallback: knn

  # ----- backbone: freeze 的 ST-GCN -----
  backbone_cls: net.st_gcn.Model
  backbone_args:
    in_channels: 4
    num_class: 20
    edge_importance_weighting: true
    graph_args: { layout: sga_interact_17, strategy: spatial }
  backbone_weights: ./work_dir/recognition/tag/ST_GCN_C4_processed/best_model.pt
  backbone_ignore: []
  freeze_backbone: true
  person_pool: mean

  # ----- KD -----
  kd:
    enable: true
    alpha: 0.3
    temperature: 2.0

device: [0]
batch_size: 16
test_batch_size: 8

# 你说 30 多轮就到顶：那就把总 epoch 缩短 + eval_interval=1
num_epoch: 40
base_lr: 0.005
weight_decay: 0.0005
step: [25, 35]
show_topk: [1, 5]

# processor 旧字段兼容（你工程里已经有）
use_kd: true
kd_alpha: 0.3
kd_temperature: 2.0

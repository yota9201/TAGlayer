work_dir: ./work_dir/tal/stgcn_tal_framewise

phase: train
save_result: false
start_epoch: 0
num_epoch: 40
use_gpu: true
device: [0]

log_interval: 20
save_interval: 10
eval_interval: 1
save_log: true
print_log: true
pavi_log: false

num_class: 20
in_channels: 4
max_frame: 400
ignore_index: -100
downsample_rate: 1

feeder: feeder.feeder_sga_tal.Feeder
num_worker: 0
train_feeder_args:
  data_path: ./data/basketball_processed/GAL/C4
  split: train
  debug: false
test_feeder_args:
  data_path: ./data/basketball_processed/GAL/C4
  split: val
  debug: false

batch_size: 8
test_batch_size: 8
debug: false

model: net.tal_framewise_model.Model
model_args:
  in_channels: 4
  num_class: 20
  num_point: 17
  num_person: 6
  tag:
    enable: true
    mode: ball
    use_ball: true
    detach_adj: true
    norm: sym
    lambda_fuse: 0.05
    learnable_lambda: false
    self_loop: true
    ramp_epochs: 12
    tau: 0.35
    ball_mix: true
    ball_weight: 0.8
    ball_tau_center: 0.35
  backbone_cls: net.st_gcn.Model
  backbone_args:
    in_channels: 4
    num_class: 20
    edge_importance_weighting: true
    graph_args:
      layout: sga_interact_17
      strategy: spatial
  backbone_weights: null
  freeze_backbone: false
  person_pool: mean

weights: null
ignore_weights: []

base_lr: 0.0005
step: [25, 35]
optimizer: AdamW
nesterov: true
weight_decay: 0.0005

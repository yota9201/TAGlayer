feeder: feeder.feeder.Feeder
train_feeder_args:
  data_path: data/basketball_processed/GAR/C4/train_data.npy
  label_path: data/basketball_processed/GAR/C4/train_label.pkl
  random_choose: true
  random_move: true
  window_size: 400

test_feeder_args:
  data_path: data/basketball_processed/GAR/C4/val_data.npy
  label_path: data/basketball_processed/GAR/C4/val_label.pkl

model: net.shift_dual_stgcn_backbone.Model
model_args:
  # ===== 你的端到端总模型参数 =====
  in_channels: 4
  num_class: 20            # ← 你的任务类别数（给最终分类头用）
  num_point: 17
  num_person: 6
  graph: net.graph.Graph
  graph_args:
    layout: sga_interact_17
    strategy: spatial
    max_hop: 1
    dilation: 1

  # ===== TAG（建议 ball）=====
  tag:
    enable: true
    mode: ball
    k: 2
    lambda_fuse: 0.5
    learnable_lambda: true
    self_loop: true
    norm: row
    detach_adj: true
    use_ball: true
    fallback: knn

  # ===== ST-GCN 骨干配置（关键：num_class 要在 backbone_args 里）=====
  backbone_cls: net.st_gcn.Model
  backbone_args:
    in_channels: 4
    num_class: 20           # ★★ 必填：ST-GCN 的构造参数
    edge_importance_weighting: true
    graph_args:
      layout: sga_interact_17
      strategy: spatial
  backbone_weights: work_dir/recognition/sga/ST_GCN_4chan_finetune/epoch80_model.pt
  backbone_ignore: []        # 同架构微调 → 不忽略
  freeze_backbone: true
  person_pool: max
  in_channels_semantic: 1
  use_temporal_attention: true

device: [0]
batch_size: 8
test_batch_size: 8
num_epoch: 80
base_lr: 0.01
weight_decay: 0.0005
step: [30, 60]
num_worker: 4
